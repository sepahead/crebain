name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Least privilege by default; jobs opt into more only when needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  version-coherence:
    name: Version coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install verifier dependencies
        run: bun install --frozen-lockfile
      # Read-only guard: the crate version (src-tauri/Cargo.toml), the
      # package.json version, and the CITATION.cff version must all agree.
      # Catches a release that bumps one metadata file but forgets another.
      # On a tag push it also asserts the tag peels to its commit and that the
      # tag's version matches the in-tree version.
      - name: Internal version coherence (HEAD)
        run: scripts/check-version-coherence.sh
      - name: NCP consumer coherence (HEAD)
        run: scripts/check-ncp-coherence.sh
      - name: Phase 0 assurance baseline and fail-closed self-test (HEAD)
        run: node scripts/verify-phase0-baseline.mjs && node scripts/test-phase0-baseline.mjs
      - name: Version coherence (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/check-version-coherence.sh --expected-commit "$GITHUB_SHA" "${GITHUB_REF_NAME}"

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate frontend (typecheck, lint, format, tests)
        run: |
          set -o pipefail
          bun run validate 2>&1 | tee frontend-validation.log

      - name: Build + bundle-size budget
        run: bun run check:bundle

      - name: Record frontend validation summary
        if: always()
        run: |
          {
            echo "### Frontend validation"
            echo ""
            echo "- Command: \`bun run validate\` + \`bun run check:bundle\`"
            echo ""
            echo "\`\`\`"
            grep -E "Test Files|Tests|tsc --noEmit|within budget" frontend-validation.log || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  coverage:
    name: Frontend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Coverage (enforces thresholds in vite.config.ts)
        run: |
          set -o pipefail
          bun run test:coverage 2>&1 | tee coverage.log
      - name: Record coverage summary
        if: always()
        run: |
          {
            echo "### Frontend coverage"
            echo ""
            echo "\`\`\`"
            grep -E "All files|Statements|Branches|Functions|Lines" coverage.log || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: Backend (Rust)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        # Keep in sync with rust-toolchain.toml (the action's RUSTUP_TOOLCHAIN
        # export would otherwise override the repo's pinned toolchain file).
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
          components: clippy, rustfmt

      # ort-sys rc.12 derives this path from the Xcode clang major version.
      # Some macos-latest images keep the runtime under a versioned resource
      # directory instead, so provide the authoritative path reported by clang.
      - name: Locate macOS clang runtime
        if: runner.os == 'macOS'
        run: |
          CLANG_RT_DIR="$(xcrun clang --print-resource-dir)/lib/darwin"
          test -e "$CLANG_RT_DIR/libclang_rt.osx.a"
          echo "RUSTFLAGS=-Lnative=$CLANG_RT_DIR" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$CLANG_RT_DIR${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rustfmt
        run: |
          set -o pipefail
          bun run fmt:rust:check 2>&1 | tee rust-fmt.log

      - name: Check Rust
        run: |
          set -o pipefail
          bun run check:rust 2>&1 | tee rust-check.log

      - name: Clippy
        run: |
          set -o pipefail
          bun run clippy:rust 2>&1 | tee rust-clippy.log

      # The dormant NCP bridge and runtime-gated Galadriel producer live behind
      # `ncp`, so default checks do not compile them. Lint the complete feature
      # surface (clippy also catches build breaks).
      - name: Clippy NCP bridge and Galadriel producer (feature `ncp`)
        run: |
          set -o pipefail
          bun run clippy:rust:ncp 2>&1 | tee rust-ncp.log

      # clippy:rust:ncp only compiles + lints; run the bridge, registry, codec,
      # fusion-ledger, bounded-queue, heartbeat, and lifecycle unit tests too.
      # First build here pulls Zenoh (ncp-zenoh), so allow extra time on a cold
      # cache; rust-cache above keeps subsequent runs fast.
      - name: Test NCP bridge and Galadriel producer (feature `ncp`)
        timeout-minutes: 30
        run: |
          set -o pipefail
          bun run test:rust:ncp 2>&1 | tee rust-ncp-test.log

      - name: Run tests
        run: |
          set -o pipefail
          bun run test:rust 2>&1 | tee rust-test.log

      - name: Record backend validation summary
        if: always()
        run: |
          {
            echo "### Backend validation (${{ matrix.os }})"
            echo ""
            echo "- Commands: \`fmt:rust:check\`, \`check:rust\`, \`clippy:rust\`, \`clippy:rust:ncp\`, \`test:rust\`, \`test:rust:ncp\`"
            echo ""
            echo "\`\`\`"
            grep -E "test result:|Finished|error:" rust-check.log rust-clippy.log rust-test.log rust-ncp-test.log || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-features:
    name: Backend feature gates (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      # ort uses load-dynamic, so the cuda/tensorrt features compile without the
      # CUDA SDK present (the EP is resolved at runtime). This guards the
      # feature-gated code paths from rotting.
      - name: cargo check --features cuda,tensorrt
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --features cuda,tensorrt
      # The disabled-Zenoh stub is separate code and must continue to satisfy
      # the Transport trait when consumers build a minimal feature set.
      - name: cargo check --no-default-features
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --no-default-features

  plant-authority-foundation:
    name: Inert plant authority boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
          components: clippy, rustfmt
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Verify package and dependency boundary
        run: bun run check:plant-boundary
      - name: Verify frame-convention corpus
        run: bun run check:plant-frames
      - name: Check plant Rust formatting
        run: bun run fmt:plant:check
      - name: Check, lint, and test inert kernel
        run: |
          bun run check:plant
          bun run clippy:plant
          bun run test:plant
      - name: Run headless self-check
        run: bun run self-check:plant
