name: Supply chain audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-published advisories surface even without a code change.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: python3 scripts/verify-vendor-compat.py
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check

  bun-audit:
    name: bun audit (npm advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # Enforced: production and development dependencies are both part of the
      # build supply chain, so any known advisory fails the workflow.
      - run: bun audit
