name: Supply chain audit

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/deny.toml'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/deny.toml'
      - 'package.json'
      - 'bun.lock'
  schedule:
    # Weekly, so newly-published advisories surface even without a code change.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check

  bun-audit:
    name: bun audit (npm advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # Enforced: production and development dependencies are both part of the
      # build supply chain, so any known advisory fails the workflow.
      - run: bun audit
