name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    permissions:
      contents: write # create the draft release and upload bundles
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target aarch64-apple-darwin'
          - os: ubuntu-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Locate macOS clang runtime
        if: runner.os == 'macOS'
        run: |
          CLANG_RT_DIR="$(xcrun clang --print-resource-dir)/lib/darwin"
          test -e "$CLANG_RT_DIR/libclang_rt.osx.a"
          echo "RUSTFLAGS=-Lnative=$CLANG_RT_DIR" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$CLANG_RT_DIR${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # This intentionally builds the Cargo default feature set. It does not ship
      # the off-by-default `ncp` bridge/Galadriel producer; such a deployment is a
      # distinct executable with its own post-package digest and evidence record.
      - name: Build default-feature artifact and draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CREBAIN ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for release notes. Model weights are not bundled.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
