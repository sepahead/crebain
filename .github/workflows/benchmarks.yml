name: Benchmarks

on:
  schedule:
    # Weekly: archive a benchmark baseline so latency regressions are visible.
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-benchmarks:
    name: Detector benchmarks (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Run benchmarks
        run: |
          set -o pipefail
          bun run test:benchmark 2>&1 | tee benchmark-results.log
      - name: Archive results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: benchmark-results.log
          retention-days: 30
      - name: Summary
        if: always()
        run: |
          {
            echo "### Detector benchmark run"
            echo ""
            echo "Hardware: GitHub-hosted ubuntu-latest (NOT a target-hardware claim)."
            echo ""
            echo "\`\`\`"
            grep -iE "ms|fps|bench|✓|×" benchmark-results.log | head -40 || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
