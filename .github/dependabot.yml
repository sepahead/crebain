version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      frontend-dependencies:
        patterns:
          - '*'

  - package-ecosystem: cargo
    directory: /src-tauri
    # Keep path-patched overlay sources available for root graph resolution,
    # while excluding only their immutable provenance lock snapshots.
    exclude-paths:
      - 'vendor-compat/**/Cargo.lock'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      rust-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - '*'
